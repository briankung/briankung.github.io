<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>briankung.xyz - 阿公 clock</title>
  <link rel="apple-touch-icon" href="images/icons/icon-192x192.png">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: black;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    #clock-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .toolbar-btn {
      position: fixed;
      bottom: calc(1rem + env(safe-area-inset-bottom));
      width: 2.5rem;
      height: 2.5rem;
      padding: 0;
      background: transparent;
      border: none;
      cursor: pointer;
      opacity: 0.35;
      transition: opacity 0.2s ease;
      z-index: 10;
    }

    #fullscreen-btn { right: calc(1rem + env(safe-area-inset-right)); }
    #animation-btn  { right: calc(4rem + env(safe-area-inset-right)); }

    .toolbar-btn:focus-visible,
    .toolbar-btn.is-active {
      opacity: 0.85;
      outline: none;
    }

    .toolbar-btn svg {
      width: 100%;
      height: 100%;
      fill: none;
      stroke: #f8f8ff;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
  </style>
</head>
<body onclick="toggleFullscreen(event)">
  <canvas id="clock-canvas"></canvas>
  <button id="animation-btn" class="toolbar-btn" aria-label="Disable animation" onclick="toggleAnimation(event)">
    <svg id="animation-icon" viewBox="0 0 24 24">
      <path id="animation-icon-path" d="M3 12 Q 7 6, 12 12 T 21 12"/>
    </svg>
  </button>
  <button id="fullscreen-btn" class="toolbar-btn" aria-label="Enter fullscreen" onclick="toggleFullscreen(event)">
    <svg id="fullscreen-icon" viewBox="0 0 24 24">
      <path id="fullscreen-icon-path" d="M20 14 A 8 8 0 1 1 10 4 A 6 6 0 0 0 20 14 Z"/>
    </svg>
  </button>
</body>
</html>

<script src="https://cdnjs.cloudflare.com/ajax/libs/nosleep/0.12.0/NoSleep.min.js" integrity="sha512-DSzvYfxJWRi3E6vfcGQfL5CqOlApxYrrdqRP3hRCnoiZ0oM6+ccYjbtdzQFUrAOI/ehKk0VKFuKs5GseGPkVjQ==" crossorigin="anonymous"></script>

<script>
  const MILLISECONDS = 1000,
        ONE_MINUTE_IN_MILLISECONDS = MILLISECONDS * 60,
        NO_SLEEP = new NoSleep();

  let noSleepOn = false;

  function isStandalone() {
    return window.navigator.standalone === true ||
           window.matchMedia('(display-mode: standalone)').matches ||
           window.matchMedia('(display-mode: fullscreen)').matches;
  };

  function setNoSleep(on) {
    if (on === noSleepOn) return;
    on ? NO_SLEEP.enable() : NO_SLEEP.disable();
    noSleepOn = on;
  };

  function toggleFullscreen(event) {
    if (event) event.stopPropagation();
    // In an installed PWA there's no browser chrome to toggle, so the button
    // becomes a wake-lock toggle. In a regular browser tab, tie the wake lock
    // to fullscreen state — on entering, on while in, off on exit.
    if (isStandalone()) {
      setNoSleep(!noSleepOn);
      if (noSleepOn) lockLandscape();
    } else {
      const enteringFullscreen = !isFullscreen();
      setNoSleep(enteringFullscreen);
      document.webkitIsFullScreen == undefined ? standardToggleFullscreen() : webkitToggleFullscreen();
      if (enteringFullscreen) lockLandscape();
    }
    updateFullscreenIcon();
  };

  function webkitToggleFullscreen() {
    document.webkitIsFullScreen ? document.webkitExitFullscreen() : document.body.webkitRequestFullscreen();
  };

  function standardToggleFullscreen() {
    document.fullscreen ? document.exitFullscreen() : document.body.requestFullscreen();
  };

  function lockLandscape() {
    if (screen.orientation && screen.orientation.lock) {
      screen.orientation.lock('landscape').catch(() => {});
    }
  };

  const FS_ICON_PATH = document.getElementById('fullscreen-icon-path'),
        FS_BTN = document.getElementById('fullscreen-btn');

  // Each button has two states bundled together: icon path, highlight, label.
  // Highlight is always tied to the "on" state.
  const WAKE_STATES = {
    on:  { path: "M16 12 a4 4 0 1 1 -8 0 a4 4 0 1 1 8 0 M12 2 v2 M12 20 v2 M2 12 h2 M20 12 h2 M4.9 4.9 l1.4 1.4 M17.7 17.7 l1.4 1.4 M4.9 19.1 l1.4 -1.4 M17.7 6.3 l1.4 -1.4",
           highlight: true,
           label: 'Disable wake lock' },
    off: { path: "M20 14 A 8 8 0 1 1 10 4 A 6 6 0 0 0 20 14 Z",
           highlight: false,
           label: 'Enable wake lock' },
  };

  const ANIM_STATES = {
    on:  { path: "M3 12 Q 7 6, 12 12 T 21 12",
           highlight: true,
           label: 'Disable animation' },
    off: { path: "M3 12 H 21",
           highlight: false,
           label: 'Enable animation' },
  };

  function applyState(btn, pathEl, state) {
    pathEl.setAttribute('d', state.path);
    btn.setAttribute('aria-label', state.label);
    btn.classList.toggle('is-active', state.highlight);
  }

  function isFullscreen() {
    return !!(document.fullscreenElement || document.webkitFullscreenElement || document.webkitIsFullScreen);
  };

  function updateFullscreenIcon() {
    const on = isStandalone() ? noSleepOn : isFullscreen();
    applyState(FS_BTN, FS_ICON_PATH, on ? WAKE_STATES.on : WAKE_STATES.off);
  };

  document.addEventListener('fullscreenchange', updateFullscreenIcon);
  document.addEventListener('webkitfullscreenchange', updateFullscreenIcon);

  const ANIM_BTN = document.getElementById('animation-btn'),
        ANIM_ICON_PATH = document.getElementById('animation-icon-path');

  let animationOn = true;

  function updateAnimationIcon() {
    applyState(ANIM_BTN, ANIM_ICON_PATH, animationOn ? ANIM_STATES.on : ANIM_STATES.off);
  };

  updateAnimationIcon();

  function toggleAnimation(event) {
    if (event) event.stopPropagation();
    animationOn = !animationOn;
    updateAnimationIcon();
    if (animationOn && rafId === null) {
      rafId = requestAnimationFrame(frame);
    } else if (!animationOn) {
      draw(performance.now());
    }
  };

  // ---------- Caustic-lit clock shader ----------
  const canvas = document.getElementById('clock-canvas'),
        gl = canvas.getContext('webgl', { antialias: true, premultipliedAlpha: false });

  const VERT_SRC = `
    attribute vec2 aPos;
    void main() { gl_Position = vec4(aPos, 0.0, 1.0); }
  `;

  const FRAG_SRC = `
    precision highp float;

    uniform vec2  uResolution;
    uniform float uTime;
    uniform float uWaterLevel;
    uniform float uAnimate;
    uniform sampler2D uMask;

    const float TAU = 6.28318530718;
    const vec3  LIGHT_COLOR = vec3(0.65, 0.88, 1.0);
    const float BRIGHTNESS  = 1.7;
    const float FALLOFF     = 0.6;
    const float CELL_DENSITY = 1.4; // larger = smaller cells

    // 2D dappled caustic — adapted from TDM's "Caustic" (Shadertoy MdlXz8)
    float caustic(vec2 p, float time) {
      vec2 i = p;
      float c = 1.0;
      float inten = 0.005;
      for (int n = 0; n < 5; n++) {
        float t = time * (1.0 - (3.5 / float(n + 1)));
        i = p + vec2(cos(t - i.x) + sin(t + i.y),
                     sin(t - i.y) + cos(t + i.x));
        c += 1.0 / length(vec2(p.x / (sin(i.x + t) / inten),
                               p.y / (cos(i.y + t) / inten)));
      }
      c /= 5.0;
      c = 1.17 - pow(c, 1.4);
      return pow(abs(c), 8.0);
    }

    void main() {
      vec2 uv = gl_FragCoord.xy / uResolution.xy;
      float mask = texture2D(uMask, uv).r;

      if (uAnimate < 0.5) {
        gl_FragColor = vec4(vec3(mask), 1.0);
        return;
      }

      // Spotlight stretches until its right edge meets the right viewport.
      // The center sits at (40%, 60%); the outer radius in height-units is the
      // distance from there to the right edge. Cell density scales inversely
      // so roughly the same number of cells fit inside the spotlight.
      // Spotlight stays in the upper portion. Compress vertically so the lobe
      // stretches toward the right edge but never reaches the bottoms or the
      // left corner.
      float aspect = uResolution.x / uResolution.y;
      vec2 spotCenter = vec2(uResolution.x * 0.4, uResolution.y * 0.75);
      float outerR = 0.55 * aspect;
      float innerR = 0.05;
      float densityScale = 0.45 / outerR;

      vec2 p = gl_FragCoord.xy / uResolution.y * TAU * CELL_DENSITY * densityScale - 250.0;
      float light = caustic(p, uTime * 0.5 + 23.0);

      vec2 centered = (gl_FragCoord.xy - spotCenter) / uResolution.y;
      centered.y *= 1.7;
      float r = length(centered);
      float spotlight = 1.0 - smoothstep(innerR, outerR, r);
      light *= spotlight;

      float heightAboveWater = uv.y - uWaterLevel;
      float falloff = exp(-max(heightAboveWater, 0.0) * FALLOFF);
      light *= falloff;
      light += exp(-max(heightAboveWater, 0.0) * 14.0) * 0.35 * spotlight;

      // White glyphs modulated by the caustic, with a brightness floor so they
      // stay legible even where the caustic is dark.
      float bodyLight = clamp(light * BRIGHTNESS * 1.6 + 0.85, 0.85, 1.0);
      vec3 textColor = mix(vec3(1.0), LIGHT_COLOR, 0.2) * bodyLight;

      // Caustic over the background, outside the glyphs.
      vec3 bgColor = LIGHT_COLOR * light * BRIGHTNESS * 0.55;

      vec3 color = mix(bgColor, textColor, mask);

      gl_FragColor = vec4(color, 1.0);
    }
  `;

  function compile(type, src) {
    const sh = gl.createShader(type);
    gl.shaderSource(sh, src);
    gl.compileShader(sh);
    if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
      console.error(gl.getShaderInfoLog(sh));
    }
    return sh;
  }

  const prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, VERT_SRC));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FRAG_SRC));
  gl.linkProgram(prog);
  gl.useProgram(prog);

  const quadBuf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const aPos = gl.getAttribLocation(prog, 'aPos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  const uResolution = gl.getUniformLocation(prog, 'uResolution'),
        uTime       = gl.getUniformLocation(prog, 'uTime'),
        uWaterLevel = gl.getUniformLocation(prog, 'uWaterLevel'),
        uAnimate    = gl.getUniformLocation(prog, 'uAnimate'),
        uMask       = gl.getUniformLocation(prog, 'uMask');

  const maskTex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, maskTex);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);

  const maskCanvas = document.createElement('canvas'),
        maskCtx = maskCanvas.getContext('2d');

  let currentTime = '',
      waterLevel = 0.15;

  function uploadMask() {
    if (!currentTime || !maskCanvas.width) return;
    const w = maskCanvas.width, h = maskCanvas.height;

    maskCtx.fillStyle = 'black';
    maskCtx.fillRect(0, 0, w, h);

    let fontSize = Math.floor(h * 0.85);
    const fontFamily = 'SimSun, "Songti SC", "Songti TC", serif';
    maskCtx.font = `${fontSize}px ${fontFamily}`;
    const measured = maskCtx.measureText(currentTime);
    if (measured.width > w * 0.92) {
      fontSize = Math.floor(fontSize * (w * 0.92) / measured.width);
      maskCtx.font = `${fontSize}px ${fontFamily}`;
    }

    maskCtx.fillStyle = 'white';
    maskCtx.textAlign = 'center';
    maskCtx.textBaseline = 'middle';
    maskCtx.fillText(currentTime, w / 2, h / 2);

    // Water level: just below the digit baseline, in WebGL uv (y=0 at bottom)
    const textBottomPx = h / 2 + fontSize * 0.4;
    waterLevel = Math.max(0.0, 1.0 - textBottomPx / h - 0.01);

    gl.bindTexture(gl.TEXTURE_2D, maskTex);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, maskCanvas);
  }

  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const w = Math.floor(window.innerWidth * dpr);
    const h = Math.floor(window.innerHeight * dpr);
    canvas.width = w;
    canvas.height = h;
    maskCanvas.width = w;
    maskCanvas.height = h;
    gl.viewport(0, 0, w, h);
    uploadMask();
    if (!animationOn) draw(performance.now());
  }

  function updateDisplayTime() {
    const match = (new Date)
      .toLocaleString('en-US', { hour: 'numeric', minute: 'numeric', hour12: true })
      .match(/^(\d{1,2}:\d{2})(.+)$/);
    currentTime = match ? match[1] : '';
    uploadMask();
    if (!animationOn) draw(performance.now());
  }

  const TARGET_FPS = 24,
        FRAME_INTERVAL_MS = 1000 / TARGET_FPS;
  let lastFrameTime = -Infinity,
      rafId = null;

  function draw(t) {
    gl.uniform2f(uResolution, canvas.width, canvas.height);
    gl.uniform1f(uTime, t / 1000);
    gl.uniform1f(uWaterLevel, waterLevel);
    gl.uniform1f(uAnimate, animationOn ? 1.0 : 0.0);
    gl.uniform1i(uMask, 0);
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, maskTex);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  }

  function frame(t) {
    rafId = null;
    if (t - lastFrameTime < FRAME_INTERVAL_MS) {
      rafId = requestAnimationFrame(frame);
      return;
    }
    lastFrameTime = t;
    draw(t);
    if (animationOn) rafId = requestAnimationFrame(frame);
  }

  window.addEventListener('resize', resize);
  resize();
  updateDisplayTime();

  const MS_TO_NEXT_MINUTE = ONE_MINUTE_IN_MILLISECONDS - ((new Date).getSeconds() * MILLISECONDS);
  setTimeout(() => {
    updateDisplayTime();
    setInterval(updateDisplayTime, ONE_MINUTE_IN_MILLISECONDS);
  }, MS_TO_NEXT_MINUTE);

  rafId = requestAnimationFrame(frame);
</script>

 <script src="../src/pulldown.js"></script>
