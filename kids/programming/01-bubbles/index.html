<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bubbles &#8212; Code Playground</title>
  <link rel="stylesheet" href="../shared/lesson.css">
  <style>
    :root {
      --theme: #667eea;
      --theme-hover: #5a67d8;
      --theme-text: white;
    }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<a id="back" href="../">&larr; gallery</a>

<div id="panel">
  <div id="panel-handle"></div>
  <div id="panel-bar">
    <span id="panel-bar-title">Lesson 01 &mdash; Bubbles</span>
    <button id="panel-toggle" onclick="togglePanel()">hide &#9660;</button>
  </div>
  <div id="panel-body">
    <textarea id="editor" spellcheck="false" autocorrect="off" autocapitalize="off"></textarea>
    <div id="btn-row">
      <button id="run-btn" onclick="runCode()">&#9654; Run</button>
      <button id="stop-btn" onclick="stop()">&#9632; Stop</button>
      <button id="print-btn" onclick="printCode()">🖨️ Print</button>
    </div>
    <div id="error"></div>
  </div>
</div>

<script src="../shared/lesson.js"></script>
<script>
function drawPlaceholder() {
  ctx.fillStyle = '#0f172a';
  ctx.fillRect(0, 0, WIDTH, HEIGHT);
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(255,255,255,0.22)';
  ctx.font = 'bold 28px -apple-system, sans-serif';
  ctx.fillText('Lesson 01 \u2014 Bubbles', WIDTH / 2, HEIGHT / 2 - 22);
  ctx.font = '15px monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.fillText('type code in the editor below and click Run!', WIDTH / 2, HEIGHT / 2 + 18);
  ctx.restore();
}
resize();

var CODE_STEP1 = [
"// This makes a list to hold all our bubbles",
"var bubbles = [];",
"",
"// Make 20 bubbles, each with a random position,",
"// size, color, and floating speed",
"for (var i = 0; i < 20; i++) {",
"  bubbles.push({",
"    x: random(0, WIDTH),",
"    y: random(0, HEIGHT),",
"    r: random(10, 40),",
"    color: ['pink', 'cyan', 'lime', 'yellow', 'orange'][Math.floor(random(0, 5))],",
"    speed: random(0.5, 2)",
"  });",
"}"
].join('\n');

var CODE_STEP2 = [
"// loop() runs this function over and over, super fast!",
"loop(function() {",
"",
"  // Paint the background navy blue",
"  clear('navy');",
"",
"  // Go through every bubble, draw it, then move it up",
"  for (var b of bubbles) {",
"    circle(b.x, b.y, b.r, b.color);",
"    b.y -= b.speed;   // move up!",
"",
"    // If it floated off the top, send it back to the bottom",
"    if (b.y < -b.r) {",
"      b.y = HEIGHT + b.r;",
"      b.x = random(0, WIDTH);",
"    }",
"  }",
"",
"});"
].join('\n');

function printCode() {
  buildPrintPage({
    title: 'Bubbles',
    subtitle: "Type this into your browser's console to make colorful bubbles float up the screen!",
    h1Color: '#667eea',
    tryBg: '#fffbeb', tryBorder: '#f6ad55', tryH2Color: '#d97706', tryOlColor: '#744210', tryCodeBg: '#fef3c7',
    btnBg: '#667eea', btnColor: 'white',
    step1Label: 'Create the bubbles',
    step2Label: 'Animate!',
    code1: CODE_STEP1, code2: CODE_STEP2,
    tries: [
      'Change <code>20</code> to <code>50</code> for way more bubbles',
      'Change <code>\'navy\'</code> to <code>\'darkgreen\'</code> or <code>\'purple\'</code>',
      'Make them bigger: change <code>random(10, 40)</code> to <code>random(20, 80)</code>',
      'Make them faster: change <code>random(0.5, 2)</code> to <code>random(3, 7)</code>',
      'Add more colors to the list, like <code>\'hotpink\'</code> or <code>\'gold\'</code>'
    ]
  });
}
</script>
</body>
</html>
