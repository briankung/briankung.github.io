<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flowers &#8212; Code Playground</title>
  <link rel="stylesheet" href="../shared/lesson.css">
  <style>
    :root {
      --body-bg: #87ceeb;
      --theme: #68d391;
      --theme-hover: #48bb78;
      --theme-text: #22543d;
    }
    #back { color: rgba(255,255,255,0.85); background: rgba(0,0,0,0.35); }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<a id="back" href="../">&larr; gallery</a>

<div id="panel">
  <div id="panel-handle"></div>
  <div id="panel-bar">
    <span id="panel-bar-title">Lesson 04 &mdash; Flowers</span>
    <button id="panel-toggle" onclick="togglePanel()">hide &#9660;</button>
  </div>
  <div id="panel-body">
    <textarea id="editor" spellcheck="false" autocorrect="off" autocapitalize="off"></textarea>
    <div id="btn-row">
      <button id="run-btn" onclick="runCode()">&#9654; Run</button>
      <button id="stop-btn" onclick="stop()">&#9632; Stop</button>
      <button id="print-btn" onclick="printCode()">🖨️ Print</button>
    </div>
    <div id="error"></div>
  </div>
</div>

<script src="../shared/lesson.js"></script>
<script>
function drawPlaceholder() {
  // Sky
  ctx.fillStyle = '#87ceeb';
  ctx.fillRect(0, 0, WIDTH, HEIGHT);
  // Ground
  ctx.fillStyle = 'forestgreen';
  ctx.fillRect(0, HEIGHT - 60, WIDTH, 60);
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(0,80,0,0.35)';
  ctx.font = 'bold 28px -apple-system, sans-serif';
  ctx.fillText('Lesson 04 \u2014 Flowers', WIDTH / 2, HEIGHT / 2 - 22);
  ctx.font = '15px monospace';
  ctx.fillStyle = 'rgba(0,80,0,0.28)';
  ctx.fillText('type code in the editor below and click Run!', WIDTH / 2, HEIGHT / 2 + 18);
  ctx.restore();
}
resize();

var CODE_STEP1 = [
"// A list to hold all our flowers",
"var flowers = [];",
"// A timer to control when new flowers appear",
"var timer = 0;"
].join('\n');

var CODE_STEP2 = [
"loop(function() {",
"  // Draw a sunny sky and a grassy ground",
"  clear('lightblue');",
"  rect(0, HEIGHT - 60, WIDTH, 60, 'forestgreen');",
"",
"  // Every 60 frames, plant a new flower in a random spot",
"  timer++;",
"  if (timer % 60 === 0) {",
"    flowers.push({",
"      x: random(40, WIDTH - 40),",
"      size: 0,",
"      maxSize: random(25, 55),",
"      color: ['pink', 'red', 'magenta', 'orange', 'white'][Math.floor(random(0, 5))],",
"      stem: random(50, 120)",
"    });",
"  }",
"",
"  // Draw each flower and make it grow bigger each frame",
"  for (var f of flowers) {",
"    if (f.size < f.maxSize) f.size += 1;",
"",
"    var rootY = HEIGHT - 60;",
"    var topY = rootY - f.stem;",
"",
"    // Draw the stem",
"    line(f.x, rootY, f.x, topY, 'green', 3);",
"",
"    // Once big enough, draw the petals and center",
"    if (f.size > 5) {",
"      for (var i = 0; i < 6; i++) {",
"        var a = (i / 6) * Math.PI * 2;",
"        circle(",
"          f.x + Math.cos(a) * f.size * 0.7,",
"          topY + Math.sin(a) * f.size * 0.7,",
"          f.size * 0.45,",
"          f.color",
"        );",
"      }",
"      circle(f.x, topY, f.size * 0.3, 'yellow');",
"    }",
"  }",
"});"
].join('\n');

function printCode() {
  buildPrintPage({
    title: 'Flowers',
    subtitle: "Type this into your browser's console to grow a beautiful garden!",
    h1Color: '#38a169',
    tryBg: '#f0fff4', tryBorder: '#68d391', tryH2Color: '#276749', tryOlColor: '#22543d', tryCodeBg: '#c6f6d5',
    btnBg: '#68d391', btnColor: '#22543d',
    step1Label: 'Get ready',
    step2Label: 'Grow the garden!',
    code1: CODE_STEP1, code2: CODE_STEP2,
    tries: [
      'Change <code>60</code> in <code>timer % 60</code> to <code>30</code> to plant flowers twice as fast',
      'Change <code>6</code> (petals) to <code>8</code> for fuller flowers',
      'Add <code>\'purple\'</code>, <code>\'coral\'</code>, or <code>\'hotpink\'</code> to the colors list',
      'Change <code>\'forestgreen\'</code> to <code>\'saddlebrown\'</code> for a desert garden',
      'Make taller flowers: change <code>random(50, 120)</code> to <code>random(100, 200)</code>'
    ]
  });
}
</script>
</body>
</html>
