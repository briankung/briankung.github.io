<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stars &#8212; Code Playground</title>
  <link rel="stylesheet" href="../shared/lesson.css">
  <style>
    :root {
      --theme: #f6ad55;
      --theme-hover: #ed8936;
      --theme-text: #744210;
    }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<a id="back" href="../">&larr; gallery</a>

<div id="panel">
  <div id="panel-handle"></div>
  <div id="panel-bar">
    <span id="panel-bar-title">Lesson 02 &mdash; Stars</span>
    <button id="panel-toggle" onclick="togglePanel()">hide &#9660;</button>
  </div>
  <div id="panel-body">
    <textarea id="editor" spellcheck="false" autocorrect="off" autocapitalize="off"></textarea>
    <div id="btn-row">
      <button id="run-btn" onclick="runCode()">&#9654; Run</button>
      <button id="stop-btn" onclick="stop()">&#9632; Stop</button>
      <button id="print-btn" onclick="printCode()">🖨️ Print</button>
    </div>
    <div id="error"></div>
  </div>
</div>

<script src="../shared/lesson.js"></script>
<script>
function drawPlaceholder() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, WIDTH, HEIGHT);
  // Hint: a few dim stars
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  for (var i = 0; i < 40; i++) {
    var x = Math.random() * WIDTH;
    var y = Math.random() * HEIGHT;
    var r = 0.5 + Math.random() * 1.5;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(255,255,255,0.22)';
  ctx.font = 'bold 28px -apple-system, sans-serif';
  ctx.fillText('Lesson 02 \u2014 Stars', WIDTH / 2, HEIGHT / 2 - 22);
  ctx.font = '15px monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.fillText('type code in the editor below and click Run!', WIDTH / 2, HEIGHT / 2 + 18);
  ctx.restore();
}
resize();

var CODE_STEP1 = [
"// This makes a list to hold all our stars",
"var stars = [];",
"",
"// Make 100 stars, each with a random position,",
"// size, and speed",
"for (var i = 0; i < 100; i++) {",
"  stars.push({",
"    x: random(0, WIDTH),",
"    y: random(0, HEIGHT),",
"    size: random(1, 4),",
"    speed: random(1, 5)",
"  });",
"}"
].join('\n');

var CODE_STEP2 = [
"// loop() runs this function over and over, super fast!",
"loop(function() {",
"",
"  // Paint the background black (outer space!)",
"  clear('black');",
"",
"  // Draw every star and move it to the left",
"  for (var s of stars) {",
"    circle(s.x, s.y, s.size, 'white');",
"    s.x -= s.speed;   // zoom to the left!",
"",
"    // If it goes off the left side, bring it back on the right",
"    if (s.x < 0) {",
"      s.x = WIDTH;",
"      s.y = random(0, HEIGHT);",
"    }",
"  }",
"",
"});"
].join('\n');

function printCode() {
  buildPrintPage({
    title: 'Stars',
    subtitle: "Type this into your browser's console to zoom through a starfield in outer space!",
    h1Color: '#d97706',
    tryBg: '#fffbeb', tryBorder: '#f6ad55', tryH2Color: '#d97706', tryOlColor: '#744210', tryCodeBg: '#fef3c7',
    btnBg: '#f6ad55', btnColor: '#744210',
    step1Label: 'Create the stars',
    step2Label: 'Animate!',
    code1: CODE_STEP1, code2: CODE_STEP2,
    tries: [
      'Change <code>100</code> to <code>300</code> for a super dense starfield',
      'Make the stars move faster: change <code>random(1, 5)</code> to <code>random(3, 10)</code>',
      'Change <code>\'white\'</code> to <code>\'cyan\'</code> for blue stars, or <code>\'gold\'</code> for golden ones',
      'Change <code>s.x -= s.speed</code> to <code>s.x += s.speed</code> to fly the other way!',
      'Try changing <code>\'black\'</code> to <code>\'midnightblue\'</code> for a deep space look'
    ]
  });
}
</script>
</body>
</html>
