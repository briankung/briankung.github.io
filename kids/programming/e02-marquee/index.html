<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marquee &#8212; Code Playground</title>
  <link rel="stylesheet" href="../shared/lesson.css">
  <style>
    :root {
      --theme: #ffb000;
      --theme-hover: #cc8e00;
      --theme-text: black;
      --body-bg: #1a1000;
    }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<a id="back" href="../">&larr; gallery</a>

<div id="panel">
  <div id="panel-handle"></div>
  <div id="panel-bar">
    <span id="panel-bar-title">Easy 02 &mdash; Marquee</span>
    <button id="panel-toggle" onclick="togglePanel()">hide &#9660;</button>
  </div>
  <div id="panel-body">
    <textarea id="editor" spellcheck="false" autocorrect="off" autocapitalize="off"></textarea>
    <div id="btn-row">
      <button id="run-btn" onclick="runCode()">&#9654; Run</button>
      <button id="stop-btn" onclick="stop()">&#9632; Stop</button>
      <button id="print-btn" onclick="printCode()">&#128424; Print</button>
    </div>
    <div id="error"></div>
  </div>
</div>

<script src="../shared/lesson.js"></script>
<script>
function drawPlaceholder() {
  ctx.fillStyle = '#1a1000';
  ctx.fillRect(0, 0, WIDTH, HEIGHT);
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(255,176,0,0.22)';
  ctx.font = 'bold 28px -apple-system, sans-serif';
  ctx.fillText('Easy 02 \u2014 Marquee', WIDTH / 2, HEIGHT / 2 - 22);
  ctx.font = '15px monospace';
  ctx.fillStyle = 'rgba(255,176,0,0.18)';
  ctx.fillText('type code in the editor below and click Run!', WIDTH / 2, HEIGHT / 2 + 18);
  ctx.restore();
}
resize();

var CODE_STEP1 = [
"var x = WIDTH",
"var t = 0",
"",
"loop(function() {",
"  t++",
"  if (t % 2 !== 0) return",
"  clear('#1a1000')",
"",
"  text('HELLO WORLD!', x, HEIGHT / 2, '#ffb000', 48)",
"  x = x - 5",
"  if (x < -500) x = WIDTH",
"})"
].join('\n');

var CODE_STEP2 = '';

function printCode() {
  buildPrintPage({
    title: 'Marquee',
    code1: CODE_STEP1, code2: CODE_STEP2,
    tries: [
      'Change <code>\'HELLO WORLD!\'</code> to your own message',
      'Change <code>48</code> to <code>72</code> for giant text',
      'Change <code>5</code> to <code>10</code> to scroll faster',
      'Change <code>\'#ffb000\'</code> to <code>\'#ff4444\'</code> for red text',
      'Change <code>HEIGHT / 2</code> to <code>100</code> to move the text up'
    ]
  });
}
</script>
</body>
</html>
