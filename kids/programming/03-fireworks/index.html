<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fireworks &#8212; Code Playground</title>
  <link rel="stylesheet" href="../shared/lesson.css">
  <style>
    :root {
      --theme: #fc8181;
      --theme-hover: #f56565;
      --theme-text: #742a2a;
    }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<a id="back" href="../">&larr; gallery</a>

<div id="panel">
  <div id="panel-handle"></div>
  <div id="panel-bar">
    <span id="panel-bar-title">Lesson 03 &mdash; Fireworks</span>
    <button id="panel-toggle" onclick="togglePanel()">hide &#9660;</button>
  </div>
  <div id="panel-body">
    <textarea id="editor" spellcheck="false" autocorrect="off" autocapitalize="off"></textarea>
    <div id="btn-row">
      <button id="run-btn" onclick="runCode()">&#9654; Run</button>
      <button id="stop-btn" onclick="stop()">&#9632; Stop</button>
      <button id="print-btn" onclick="printCode()">🖨️ Print</button>
    </div>
    <div id="error"></div>
  </div>
</div>

<script src="../shared/lesson.js"></script>
<script>
function drawPlaceholder() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, WIDTH, HEIGHT);
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(255,255,255,0.22)';
  ctx.font = 'bold 28px -apple-system, sans-serif';
  ctx.fillText('Lesson 03 \u2014 Fireworks', WIDTH / 2, HEIGHT / 2 - 22);
  ctx.font = '15px monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.fillText('type code in the editor below and click Run!', WIDTH / 2, HEIGHT / 2 + 18);
  ctx.restore();
}
resize();

var CODE_STEP1 = [
"// This makes a list to hold all the flying sparks",
"var particles = [];",
"",
"// boom() creates a burst of sparks at position (x, y)",
"function boom(x, y) {",
"  for (var i = 0; i < 60; i++) {",
"    var angle = random(0, Math.PI * 2);  // random direction",
"    var speed = random(1, 6);",
"    particles.push({",
"      x: x, y: y,",
"      vx: Math.cos(angle) * speed,  // horizontal velocity",
"      vy: Math.sin(angle) * speed,  // vertical velocity",
"      color: ['red', 'orange', 'yellow', 'pink', 'cyan'][Math.floor(random(0, 5))],",
"      life: 1  // starts full, fades to 0",
"    });",
"  }",
"}",
"",
"// Launch the first firework in the center!",
"boom(WIDTH / 2, HEIGHT / 2);"
].join('\n');

var CODE_STEP2 = [
"loop(function() {",
"",
"  // Use a see-through black to create a fade trail effect",
"  rect(0, 0, WIDTH, HEIGHT, 'rgba(0, 0, 0, 0.15)');",
"",
"  // Update and draw every spark",
"  for (var p of particles) {",
"    circle(p.x, p.y, 3 * p.life, p.color);",
"    p.x += p.vx;          // move sideways",
"    p.y += p.vy;          // move up/down",
"    p.vy += 0.1;          // gravity pulls down",
"    p.life -= 0.015;      // fade out slowly",
"  }",
"",
"  // Remove sparks that have fully faded",
"  particles = particles.filter(p => p.life > 0);",
"",
"  // When all sparks are gone, launch a new firework!",
"  if (particles.length === 0) {",
"    boom(random(100, WIDTH - 100), random(100, HEIGHT - 100));",
"  }",
"",
"});"
].join('\n');

function printCode() {
  buildPrintPage({
    title: 'Fireworks',
    subtitle: "Type this into your browser's console to launch a dazzling fireworks display!",
    h1Color: '#e53e3e',
    tryBg: '#fff5f5', tryBorder: '#fc8181', tryH2Color: '#c53030', tryOlColor: '#742a2a', tryCodeBg: '#fed7d7',
    btnBg: '#fc8181', btnColor: '#742a2a',
    step1Label: 'Set up the firework launcher',
    step2Label: 'Animate!',
    code1: CODE_STEP1, code2: CODE_STEP2,
    tries: [
      'Change <code>60</code> to <code>120</code> for bigger, more dramatic explosions',
      'Change <code>0.1</code> (gravity) to <code>0.02</code> for slow-motion sparks',
      'Try <code>boom(random(0, WIDTH), random(0, HEIGHT))</code> to launch anywhere on screen',
      'Add <code>\'lime\'</code>, <code>\'magenta\'</code>, or <code>\'white\'</code> to the colors list',
      'Change <code>0.15</code> in the background to <code>0.05</code> for longer, ghostly trails'
    ]
  });
}
</script>
</body>
</html>
