<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fireworks &#8212; Code Playground</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }

    #back {
      position: fixed;
      top: 12px;
      left: 14px;
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      font: 13px monospace;
      background: rgba(0,0,0,0.45);
      padding: 4px 10px;
      border-radius: 6px;
      z-index: 10;
    }
    #back:hover { color: white; }

    #panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255, 255, 255, 0.96);
      border-top: 3px solid #fc8181;
      box-shadow: 0 -4px 24px rgba(0,0,0,0.18);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      transition: transform 0.3s ease;
      z-index: 10;
    }
    #panel.collapsed { transform: translateY(calc(100% - 42px)); }

    #panel-bar {
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
    }
    #panel-bar-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: #2d3748;
    }
    #panel-toggle {
      background: none;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      cursor: pointer;
      font: 12px monospace;
      color: #718096;
      padding: 3px 9px;
    }
    #panel-toggle:hover { background: #f7fafc; }

    #panel-body { padding: 0 16px 16px; }

    #editor {
      width: 100%;
      height: 160px;
      font: 13px/1.6 monospace;
      background: #1a202c;
      color: #e2e8f0;
      border: 1px solid #4a5568;
      border-radius: 8px;
      padding: 10px 12px;
      resize: vertical;
      outline: none;
      tab-size: 2;
      -moz-tab-size: 2;
    }
    #btn-row { display: flex; gap: 8px; margin-top: 10px; align-items: center; }
    #run-btn {
      background: #fc8181;
      color: #742a2a;
      border: none;
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
    }
    #run-btn:hover { background: #f56565; color: white; }
    #stop-btn {
      background: #e2e8f0;
      color: #4a5568;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
    }
    #stop-btn:hover { background: #cbd5e0; }
    #error { margin-top: 6px; font: 12px/1.4 monospace; color: #e53e3e; min-height: 16px; }
    #print-btn {
      background: #fc8181;
      color: #742a2a;
      border: none;
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
    }
    #print-btn:hover { background: #f56565; color: white; }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<a id="back" href="../">&larr; gallery</a>

<div id="panel">
  <div id="panel-bar">
    <span id="panel-bar-title">Lesson 03 &mdash; Fireworks</span>
    <button id="panel-toggle" onclick="togglePanel()">hide &#9660;</button>
  </div>
  <div id="panel-body">
    <textarea id="editor" spellcheck="false" autocorrect="off" autocapitalize="off"></textarea>
    <div id="btn-row">
      <button id="run-btn" onclick="runCode()">&#9654; Run</button>
      <button id="stop-btn" onclick="stop()">&#9632; Stop</button>
      <button id="print-btn" onclick="printCode()">&#128438; Print</button>
    </div>
    <div id="error"></div>
  </div>
</div>

<script>
// ── Canvas & resize ──────────────────────────────────────────────────────
var canvas = document.getElementById('canvas');
var ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  window.WIDTH = canvas.width;
  window.HEIGHT = canvas.height;
  if (!_loopId) drawPlaceholder();
}
window.addEventListener('resize', resize);

function drawPlaceholder() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, WIDTH, HEIGHT);
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(255,255,255,0.22)';
  ctx.font = 'bold 28px -apple-system, sans-serif';
  ctx.fillText('Lesson 03 \u2014 Fireworks', WIDTH / 2, HEIGHT / 2 - 22);
  ctx.font = '15px monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.fillText('type code in the editor below and click Run!', WIDTH / 2, HEIGHT / 2 + 18);
  ctx.restore();
}

// ── Primitives (available in the browser console) ────────────────────────

window.clear = function(color) {
  ctx.fillStyle = color || '#000';
  ctx.fillRect(0, 0, WIDTH, HEIGHT);
};

window.circle = function(x, y, r, color) {
  ctx.beginPath();
  ctx.arc(x, y, Math.max(0, r), 0, Math.PI * 2);
  ctx.fillStyle = color || 'white';
  ctx.fill();
};

window.rect = function(x, y, w, h, color) {
  ctx.fillStyle = color || 'white';
  ctx.fillRect(x, y, w, h);
};

window.line = function(x1, y1, x2, y2, color, lineWidth) {
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.strokeStyle = color || 'white';
  ctx.lineWidth = lineWidth || 1;
  ctx.stroke();
};

window.text = function(str, x, y, color, size) {
  ctx.fillStyle = color || 'white';
  ctx.font = (size || 16) + 'px monospace';
  ctx.fillText(str, x, y);
};

window.ring = function(x, y, r, color, lineWidth) {
  ctx.beginPath();
  ctx.arc(x, y, Math.max(0, r), 0, Math.PI * 2);
  ctx.strokeStyle = color || 'white';
  ctx.lineWidth = lineWidth || 1;
  ctx.stroke();
};

var _loopId = null;

window.loop = function(fn) {
  if (_loopId) cancelAnimationFrame(_loopId);
  function step() { fn(); _loopId = requestAnimationFrame(step); }
  _loopId = requestAnimationFrame(step);
};

window.stop = function() {
  if (_loopId) { cancelAnimationFrame(_loopId); _loopId = null; }
};

window.random = function(min, max) {
  return min + Math.random() * (max - min);
};

window.ctx = ctx;

resize();

// ── Panel ────────────────────────────────────────────────────────────────
var panelCollapsed = false;
function togglePanel() {
  panelCollapsed = !panelCollapsed;
  document.getElementById('panel').classList.toggle('collapsed', panelCollapsed);
  document.getElementById('panel-toggle').innerHTML =
    panelCollapsed ? 'show &#9650;' : 'hide &#9660;';
}

// ── Print view ───────────────────────────────────────────────────────────
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function colorCode(raw) {
  return raw.split('\n').map(function(line) {
    var t = line.trim();
    if (t.startsWith('//')) return '<span class="cmt">' + escHtml(line) + '</span>';
    return escHtml(line);
  }).join('\n');
}

var CODE_STEP1 = [
"// This makes a list to hold all the flying sparks",
"var particles = [];",
"",
"// boom() creates a burst of sparks at position (x, y)",
"function boom(x, y) {",
"  for (var i = 0; i < 60; i++) {",
"    var angle = random(0, Math.PI * 2);  // random direction",
"    var speed = random(1, 6);",
"    particles.push({",
"      x: x, y: y,",
"      vx: Math.cos(angle) * speed,  // horizontal velocity",
"      vy: Math.sin(angle) * speed,  // vertical velocity",
"      color: ['red', 'orange', 'yellow', 'pink', 'cyan'][Math.floor(random(0, 5))],",
"      life: 1  // starts full, fades to 0",
"    });",
"  }",
"}",
"",
"// Launch the first firework in the center!",
"boom(WIDTH / 2, HEIGHT / 2);"
].join('\n');

var CODE_STEP2 = [
"loop(function() {",
"",
"  // Use a see-through black to create a fade trail effect",
"  rect(0, 0, WIDTH, HEIGHT, 'rgba(0, 0, 0, 0.15)');",
"",
"  // Update and draw every spark",
"  for (var p of particles) {",
"    circle(p.x, p.y, 3 * p.life, p.color);",
"    p.x += p.vx;          // move sideways",
"    p.y += p.vy;          // move up/down",
"    p.vy += 0.1;          // gravity pulls down",
"    p.life -= 0.015;      // fade out slowly",
"  }",
"",
"  // Remove sparks that have fully faded",
"  particles = particles.filter(p => p.life > 0);",
"",
"  // When all sparks are gone, launch a new firework!",
"  if (particles.length === 0) {",
"    boom(random(100, WIDTH - 100), random(100, HEIGHT - 100));",
"  }",
"",
"});"
].join('\n');

// ── Editor ───────────────────────────────────────────────────────────────
function runCode() {
  stop();
  document.getElementById('error').textContent = '';
  try {
    eval(document.getElementById('editor').value);
  } catch(e) {
    document.getElementById('error').textContent = e.message;
  }
}

document.getElementById('editor').addEventListener('keydown', function(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    var start = this.selectionStart;
    this.value = this.value.substring(0, start) + '  ' + this.value.substring(start);
    this.selectionStart = this.selectionEnd = start + 2;
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
    e.preventDefault();
    runCode();
  }
});

function printCode() {
  var w = window.open('', '_blank');
  w.document.write('<!DOCTYPE html><html><head><meta charset="utf-8">'
    + '<title>Fireworks \u2014 Code Playground</title><style>'
    + 'body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;max-width:680px;margin:0 auto;padding:2rem;color:#2d3748}'
    + 'h1{font-size:2rem;color:#e53e3e;margin-bottom:.2rem}'
    + '.sub{color:#718096;margin-bottom:1.5rem;font-size:.95rem}'
    + 'h2{font-size:.95rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:#a0aec0;margin:1.5rem 0 .5rem}'
    + 'pre{background:#1a202c;color:#e2e8f0;padding:1.1rem 1.25rem;border-radius:10px;font:14px/1.75 monospace;white-space:pre-wrap;word-break:break-word}'
    + '.cmt{color:#68d391}'
    + '.try{background:#fff5f5;border-left:4px solid #fc8181;padding:1rem 1.25rem;border-radius:0 10px 10px 0;margin-top:1.5rem}'
    + '.try h2{color:#c53030;font-size:1.1rem;text-transform:none;letter-spacing:0;margin-top:0}'
    + '.try ol{padding-left:1.25rem;line-height:2.1;color:#742a2a}'
    + '.try code{background:#fed7d7;padding:1px 5px;border-radius:4px;font:13px monospace}'
    + '.print-btn{margin-top:1.5rem;background:#fc8181;color:#742a2a;border:none;border-radius:8px;padding:8px 20px;font-size:.9rem;font-weight:600;cursor:pointer}'
    + '@media print{.print-btn{display:none}}'
    + '</style></head><body>'
    + '<h1>Fireworks</h1>'
    + '<p class="sub">Type this into your browser\'s console to launch a dazzling fireworks display!</p>'
    + '<h2>Step 1 &mdash; Set up the firework launcher</h2>'
    + '<pre>' + colorCode(CODE_STEP1) + '</pre>'
    + '<h2>Step 2 &mdash; Animate!</h2>'
    + '<pre>' + colorCode(CODE_STEP2) + '</pre>'
    + '<div class="try"><h2>&#128295; Try changing these things!</h2><ol>'
    + '<li>Change <code>60</code> to <code>120</code> for bigger, more dramatic explosions</li>'
    + '<li>Change <code>0.1</code> (gravity) to <code>0.02</code> for slow-motion sparks</li>'
    + '<li>Try <code>boom(random(0, WIDTH), random(0, HEIGHT))</code> to launch anywhere on screen</li>'
    + '<li>Add <code>\'lime\'</code>, <code>\'magenta\'</code>, or <code>\'white\'</code> to the colors list</li>'
    + '<li>Change <code>0.15</code> in the background to <code>0.05</code> for longer, ghostly trails</li>'
    + '</ol></div>'
    + '<button class="print-btn" onclick="window.print()">&#128438; Print this page</button>'
    + '</body></html>');
  w.document.close();
}
</script>
</body>
</html>
