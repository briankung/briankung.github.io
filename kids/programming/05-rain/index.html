<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rain &#8212; Code Playground</title>
  <link rel="stylesheet" href="../shared/lesson.css">
  <style>
    :root {
      --body-bg: #1a1a2e;
      --theme: #76e4f7;
      --theme-hover: #0bc5ea;
      --theme-text: #065666;
    }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<a id="back" href="../">&larr; gallery</a>

<div id="panel">
  <div id="panel-handle"></div>
  <div id="panel-bar">
    <span id="panel-bar-title">Lesson 05 &mdash; Rain</span>
    <button id="panel-toggle" onclick="togglePanel()">hide &#9660;</button>
  </div>
  <div id="panel-body">
    <textarea id="editor" spellcheck="false" autocorrect="off" autocapitalize="off"></textarea>
    <div id="btn-row">
      <button id="run-btn" onclick="runCode()">&#9654; Run</button>
      <button id="stop-btn" onclick="stop()">&#9632; Stop</button>
      <button id="print-btn" onclick="printCode()">🖨️ Print</button>
    </div>
    <div id="error"></div>
  </div>
</div>

<script src="../shared/lesson.js"></script>
<script>
function drawPlaceholder() {
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, WIDTH, HEIGHT);
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(160,216,239,0.3)';
  ctx.font = 'bold 28px -apple-system, sans-serif';
  ctx.fillText('Lesson 05 \u2014 Rain', WIDTH / 2, HEIGHT / 2 - 22);
  ctx.font = '15px monospace';
  ctx.fillStyle = 'rgba(160,216,239,0.22)';
  ctx.fillText('type code in the editor below and click Run!', WIDTH / 2, HEIGHT / 2 + 18);
  ctx.restore();
}
resize();

var CODE_STEP1 = [
"// Lists to hold our raindrops and ripples",
"var drops = [];",
"var ripples = [];"
].join('\n');

var CODE_STEP2 = [
"loop(function() {",
"  // Dark, stormy sky",
"  clear('#1a1a2e');",
"",
"  // Randomly add new raindrops at the top",
"  if (random(0, 10) < 2) {",
"    drops.push({ x: random(0, WIDTH), y: 0, speed: random(5, 10) });",
"  }",
"",
"  // Move each drop downward",
"  for (var i = drops.length - 1; i >= 0; i--) {",
"    var d = drops[i];",
"    line(d.x, d.y, d.x, d.y + 14, '#a0d8ef', 1.5);",
"    d.y += d.speed;",
"",
"    // When a drop hits the bottom, create a ripple!",
"    if (d.y > HEIGHT) {",
"      ripples.push({ x: d.x, y: HEIGHT - 8, r: 3, life: 1 });",
"      drops.splice(i, 1);",
"    }",
"  }",
"",
"  // Draw each ripple, expanding and fading out",
"  for (var r of ripples) {",
"    var opacity = r.life.toFixed(2);",
"    ring(r.x, r.y, r.r, 'rgba(160, 216, 239, ' + opacity + ')', 1.5);",
"    r.r += 2.5;     // ring grows bigger",
"    r.life -= 0.025; // and fades away",
"  }",
"  ripples = ripples.filter(r => r.life > 0);",
"",
"});"
].join('\n');

function printCode() {
  buildPrintPage({
    title: 'Rain',
    subtitle: "Type this into your browser's console to make raindrops fall and ripples spread!",
    h1Color: '#0987a0',
    tryBg: '#ebfcff', tryBorder: '#76e4f7', tryH2Color: '#0987a0', tryOlColor: '#065666', tryCodeBg: '#c4f1f9',
    btnBg: '#76e4f7', btnColor: '#065666',
    step1Label: 'Get ready',
    step2Label: 'Make it rain!',
    code1: CODE_STEP1, code2: CODE_STEP2,
    tries: [
      'Change <code>2</code> in <code>random(0, 10) &lt; 2</code> to <code>5</code> for a heavy downpour',
      'Make drops fall faster: change <code>random(5, 10)</code> to <code>random(10, 20)</code>',
      'Try <code>\'#0d2137\'</code> or <code>\'#001a00\'</code> for a different stormy sky',
      'Change the raindrop color <code>\'#a0d8ef\'</code> to <code>\'#ffd700\'</code> for golden rain',
      'Make bigger ripples: change <code>2.5</code> (ring growth) to <code>5</code>'
    ]
  });
}
</script>
</body>
</html>
